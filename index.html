<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오범석 링크 모음</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F8F7F4;
    --surface:   #FFFFFF;
    --surface2:  #F2F1EE;
    --border:    #E8E6E1;
    --text:      #1A1917;
    --text-2:    #6B6860;
    --text-3:    #A09D98;
    --accent:    #C0392B;
    --accent-bg: #FDF1F0;
    --radius:    10px;
    --radius-lg: 16px;
    --shadow:    0 4px 16px rgba(0,0,0,.07), 0 1px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
    --t: 180ms cubic-bezier(.4,0,.2,1);
  }
  [data-theme="dark"] {
    --bg:        #111110;
    --surface:   #1C1B1A;
    --surface2:  #232220;
    --border:    #2E2C2A;
    --text:      #F0EDE8;
    --text-2:    #8A8680;
    --text-3:    #555250;
    --accent:    #E05044;
    --accent-bg: #1F1514;
    --shadow:    0 4px 16px rgba(0,0,0,.4);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.6);
  }

  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; -webkit-font-smoothing: antialiased; line-height: 1.6;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 48px 24px 80px; }

  /* Header */
  .site-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 48px;
  }
  .site-title { font-size: 1.05rem; font-weight: 700; letter-spacing: -.3px; }
  .site-title span { color: var(--text-2); font-weight: 400; }
  .header-actions { display: flex; gap: 4px; }
  .hdr-btn {
    width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent;
    color: var(--text-2); font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--t), color var(--t);
  }
  .hdr-btn:hover { background: var(--surface2); color: var(--text); }
  .hdr-btn.active { color: var(--accent); }

  /* Pinned */
  #pinned-section { display: none; margin-bottom: 40px; }
  .section-label {
    font-size: .7rem; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 12px;
  }
  .pinned-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; }

  /* Board */
  .board { display: grid; grid-template-columns: 1fr 1fr; gap: 0 48px; align-items: start; }
  @media (max-width: 720px) {
    .board { grid-template-columns: 1fr; }
    .wrap { padding: 28px 16px 80px; }
    .site-header { margin-bottom: 32px; }
  }

  /* Category */
  .cat-block { margin-bottom: 32px; }
  .cat-header {
    display: flex; align-items: center; gap: 8px;
    padding-bottom: 10px; margin-bottom: 10px;
    border-bottom: 1px solid var(--border);
    cursor: pointer; user-select: none;
  }
  .cat-drag-handle { display: none; color: var(--text-3); font-size: .85rem; cursor: grab; padding: 2px 4px; border-radius: 4px; }
  .cat-drag-handle:hover { color: var(--text-2); }
  .cat-name { font-size: .72rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); flex: 1; transition: color var(--t); }
  .cat-header:hover .cat-name { color: var(--text-2); }
  .cat-toggle { font-size: .65rem; color: var(--text-3); transition: transform var(--t); }
  .cat-block.collapsed .cat-toggle { transform: rotate(-90deg); }
  .cat-body { display: flex; flex-direction: column; gap: 6px; }
  .cat-block.collapsed .cat-body { display: none; }

  /* Card */
  .link-card {
    display: flex; align-items: stretch;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color var(--t), box-shadow var(--t), transform var(--t), opacity var(--t);
  }
  .link-card:hover { border-color: transparent; box-shadow: var(--shadow); transform: translateY(-1px); }
  .card-drag {
    display: none; align-items: center; justify-content: center;
    width: 28px; color: var(--border); font-size: .8rem;
    cursor: grab; flex-shrink: 0; transition: color var(--t);
  }
  .card-drag:hover { color: var(--text-3); }
  .card-main {
    display: flex; align-items: center; gap: 10px; flex: 1;
    padding: 11px 14px 11px 12px; text-decoration: none;
    color: var(--text); min-width: 0; font-size: .875rem; font-weight: 500;
    transition: color var(--t);
  }
  .card-main:hover { color: var(--accent); }
  .card-emoji { font-size: 1rem; flex-shrink: 0; line-height: 1; }
  .card-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-subs { display: flex; align-items: center; gap: 4px; padding: 0 8px 0 0; flex-shrink: 0; }
  .card-sub-link {
    font-size: .7rem; font-weight: 600; color: var(--text-3);
    text-decoration: none; padding: 4px 8px; border-radius: 6px;
    background: var(--surface2); white-space: nowrap;
    transition: background var(--t), color var(--t);
  }
  .card-sub-link:hover { background: var(--accent-bg); color: var(--accent); }
  .card-actions {
    display: none; align-items: center; padding: 0 4px; border-left: 1px solid var(--border);
  }
  .card-action {
    width: 30px; min-height: 38px; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: .8rem; cursor: pointer; color: var(--text-3);
    transition: color var(--t), background var(--t);
  }
  .card-action:hover { color: var(--accent); background: var(--accent-bg); }
  .card-action.on { color: var(--accent); }

  /* Pinned card */
  .pinned-card {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); text-decoration: none;
    color: var(--text); font-size: .85rem; font-weight: 500;
    transition: border-color var(--t), box-shadow var(--t), transform var(--t);
  }
  .pinned-card:hover { border-color: transparent; box-shadow: var(--shadow); transform: translateY(-1px); }

  /* Loader */
  #loader { display: flex; align-items: center; justify-content: center; padding: 80px 0; }
  .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--text-2); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Add btn */
  #add-btn {
    display: none; width: 100%; margin-top: 40px; padding: 13px;
    border-radius: var(--radius); border: 1.5px dashed var(--border);
    background: transparent; color: var(--text-3);
    font-size: .78rem; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer;
    transition: border-color var(--t), color var(--t), background var(--t);
  }
  #add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  /* Overlay */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.45); backdrop-filter: blur(4px);
    z-index: 100; opacity: 0; transition: opacity .25s;
  }

  /* Sidebar */
  #sidebar {
    position: fixed; top: 0; right: -440px; bottom: 0;
    width: 100%; max-width: 400px;
    background: var(--surface); border-left: 1px solid var(--border);
    z-index: 101; display: flex; flex-direction: column;
    transition: right .28s cubic-bezier(.4,0,.2,1);
  }
  .sb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 24px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0;
  }
  .sb-title { font-size: .95rem; font-weight: 700; }
  .sb-close {
    width: 32px; height: 32px; border: none; background: transparent;
    border-radius: 8px; color: var(--text-2); font-size: 1.1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background var(--t), color var(--t);
  }
  .sb-close:hover { background: var(--surface2); color: var(--text); }
  .sb-body { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .sb-label { font-size: .7rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--text-3); margin-bottom: 4px; }
  .sb-input {
    width: 100%; padding: 11px 14px; background: var(--surface2);
    border: 1px solid transparent; border-radius: var(--radius);
    color: var(--text); font-size: .875rem; outline: none;
    transition: border-color var(--t), background var(--t); appearance: none;
  }
  .sb-input:focus { border-color: var(--accent); background: var(--surface); }
  select.sb-input { cursor: pointer; }

  .emoji-row { display: flex; gap: 10px; align-items: center; position: relative; }
  #emoji-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--surface2); border: 1px solid transparent;
    border-radius: var(--radius); font-size: 1.1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: border-color var(--t); user-select: none;
  }
  #emoji-btn:hover { border-color: var(--accent); }
  #emoji-picker {
    display: none; position: absolute; top: calc(100% + 6px); left: 0; width: 272px;
    grid-template-columns: repeat(8, 1fr); gap: 4px; padding: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg);
    z-index: 110; max-height: 200px; overflow-y: auto;
  }
  .ep-item { font-size: 1rem; text-align: center; padding: 5px; border-radius: 6px; cursor: pointer; transition: background var(--t), transform var(--t); }
  .ep-item:hover { background: var(--surface2); transform: scale(1.15); }

  .sub-row { display: flex; gap: 6px; align-items: center; }
  .sub-row .sb-input { margin: 0; }
  .sub-del {
    flex-shrink: 0; width: 30px; height: 30px; border: none; background: transparent;
    border-radius: 6px; color: var(--text-3); font-size: .9rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background var(--t), color var(--t);
  }
  .sub-del:hover { background: #fef2f2; color: #ef4444; }
  .sub-add-btn {
    width: 100%; padding: 9px; background: var(--surface2);
    border: 1px dashed var(--border); border-radius: var(--radius);
    color: var(--text-3); font-size: .78rem; font-weight: 600; cursor: pointer;
    transition: all var(--t); letter-spacing: .04em;
  }
  .sub-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }

  .sb-footer { padding: 16px 24px 24px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--border); flex-shrink: 0; }
  .sb-save {
    padding: 13px; background: var(--text); color: var(--bg);
    border: none; border-radius: var(--radius); font-size: .875rem; font-weight: 700;
    cursor: pointer; transition: opacity var(--t), transform var(--t);
  }
  .sb-save:hover { opacity: .88; transform: translateY(-1px); }
  .sb-save:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .sb-delete {
    display: none; padding: 11px; background: transparent;
    color: #ef4444; border: 1px solid #fecaca; border-radius: var(--radius);
    font-size: .8rem; font-weight: 600; cursor: pointer; transition: background var(--t);
  }
  .sb-delete:hover { background: #fef2f2; }

  /* DnD */
  .link-card.dragging, .cat-block.dragging { opacity: .35; }
  .link-card.drag-over { box-shadow: 0 0 0 2px var(--accent); border-color: transparent; }
  .cat-block.drag-over .cat-body { outline: 2px dashed var(--accent); outline-offset: 4px; border-radius: var(--radius); }
</style>
</head>
<body>
<div class="wrap">
  <header class="site-header">
    <div class="site-title">오범석 <span>링크 모음</span></div>
    <div class="header-actions">
      <button class="hdr-btn" onclick="toggleTheme()">◐</button>
      <button class="hdr-btn" id="lock-btn" onclick="login()">🔒</button>
    </div>
  </header>

  <section id="pinned-section">
    <div class="section-label">상단 고정</div>
    <div class="pinned-grid" id="pinned-grid"></div>
  </section>

  <div id="loader"><div class="spinner"></div></div>

  <div class="board" id="board" style="display:none">
    <div id="col-left"></div>
    <div id="col-right"></div>
  </div>

  <button id="add-btn" onclick="openSidebar()">+ 새 링크 추가</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<div id="sidebar">
  <div class="sb-header">
    <span class="sb-title" id="sb-title">새 링크 추가</span>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sb-body">
    <input type="hidden" id="f-id">
    <input type="hidden" id="f-pinned" value="false">
    <div>
      <div class="sb-label">위치</div>
      <select id="f-pos" class="sb-input">
        <option value="left">왼쪽 단</option>
        <option value="right">오른쪽 단</option>
      </select>
    </div>
    <div>
      <div class="sb-label">카테고리</div>
      <select id="f-cat" class="sb-input" onchange="onCatChange()"></select>
      <input type="text" id="f-cat-new" class="sb-input" placeholder="새 카테고리 이름" style="display:none; margin-top:6px;">
    </div>
    <div>
      <div class="sb-label">제목 & 이모지</div>
      <div class="emoji-row">
        <button type="button" id="emoji-btn" onclick="toggleEmojiPicker(event)">🔗</button>
        <input type="hidden" id="f-emoji" value="🔗">
        <input type="text" id="f-title" class="sb-input" placeholder="제목" style="flex:1; width:auto;">
        <div id="emoji-picker"></div>
      </div>
    </div>
    <div>
      <div class="sb-label">URL</div>
      <input type="text" id="f-url" class="sb-input" placeholder="https://">
    </div>
    <div>
      <div class="sb-label">서브 버튼</div>
      <div id="subs-wrap" style="display:flex; flex-direction:column; gap:6px; margin-bottom:8px;"></div>
      <button type="button" class="sub-add-btn" onclick="addSubRow()">+ 서브 버튼 추가</button>
    </div>
  </div>
  <div class="sb-footer">
    <button class="sb-save" id="f-save" onclick="handleSave()">저장하기</button>
    <button class="sb-delete" id="f-delete" onclick="handleDelete()">이 링크 삭제</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, query, orderBy, writeBatch, serverTimestamp, increment, setDoc, getDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDEKGBEhenAfsxPz5SXMFBMjctQkCdRW5A",
    authDomain: "olink-76ad8.firebaseapp.com",
    projectId: "olink-76ad8",
    storageBucket: "olink-76ad8.firebasestorage.app",
    messagingSenderId: "1093215928826",
    appId: "1:1093215928826:web:5155fb31a9e57b94316443",
    measurementId: "G-943X2BPJG2"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── State ───────────────────────────────────────
  let isAdmin = false;
  let adminPw = '';
  let rawLinks = []; // [{id, category, title, url, emoji, pinned, position, subs, order}]

  const EMOJIS = ['🏫','📝','📚','🖥️','🏠','🔗','📅','✅','💡','📌','🚀','📊','📂','✉️','🔍','⚙️','⭐','🔥','📢','📁','🎵','📸','🎨','🛒','🍎','☕','🏃','💬','🛠️','📎','💼','🔖','📰','🗂️','🌐','🎯','📱','💻','🗒️','📋'];

  // ── Boot ────────────────────────────────────────
  buildEmojiPicker();
  applyStoredTheme();
  trackVisit();
  loadData();

  async function trackVisit() {
    const ref = doc(db, 'stats', 'visits');
    await setDoc(ref, { count: increment(1) }, { merge: true });
  }

  // ── Load ────────────────────────────────────────
  async function loadData() {
    const snap = await getDocs(query(collection(db, 'links'), orderBy('order', 'asc')));
    rawLinks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('loader').style.display = 'none';
    document.getElementById('board').style.display = 'grid';
    render();
  }

  // ── Render ──────────────────────────────────────
  function render() {
    const pg = document.getElementById('pinned-grid');
    const colL = document.getElementById('col-left');
    const colR = document.getElementById('col-right');
    pg.innerHTML = ''; colL.innerHTML = ''; colR.innerHTML = '';

    const pinned = rawLinks.filter(l => l.pinned);
    const ps = document.getElementById('pinned-section');
    if (pinned.length) {
      ps.style.display = 'block';
      pinned.forEach(l => pg.insertAdjacentHTML('beforeend', pinnedCardHTML(l)));
    } else {
      ps.style.display = 'none';
    }

    const lG = {}, rG = {};
    rawLinks.filter(l => !l.pinned).forEach(l => {
      const g = l.position === 'right' ? rG : lG;
      (g[l.category] = g[l.category] || []).push(l);
    });

    renderCol(lG, colL);
    renderCol(rG, colR);
    updateAdminUI();
    if (isAdmin) enableDnD();
  }

  function renderCol(groups, container) {
    for (const cat in groups) {
      const block = document.createElement('div');
      block.className = 'cat-block';
      block.innerHTML = `
        <div class="cat-header" onclick="toggleCat(this)">
          <span class="cat-drag-handle">⠿</span>
          <span class="cat-name">${cat}</span>
          <span class="cat-toggle">▾</span>
        </div>
        <div class="cat-body">
          ${groups[cat].map(l => cardHTML(l)).join('')}
        </div>`;
      container.appendChild(block);
    }
  }

  function cardHTML(l) {
    const d = JSON.stringify(l).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const subsHTML = (l.subs || []).map(s =>
      `<a class="card-sub-link" href="${s.url}" target="_blank" rel="noopener">${s.title}</a>`
    ).join('');
    return `
      <div class="link-card" ${isAdmin ? 'draggable="true"' : ''} data-item="${d}">
        <div class="card-drag">⠿</div>
        <a class="card-main" href="${l.url}" target="_blank" rel="noopener">
          <span class="card-emoji">${l.emoji}</span>
          <span class="card-title">${l.title}</span>
        </a>
        ${subsHTML ? `<div class="card-subs">${subsHTML}</div>` : ''}
        <div class="card-actions">
          <div class="card-action ${l.pinned ? 'on' : ''}" title="${l.pinned ? '고정 해제' : '상단 고정'}" onclick="window._togglePin('${l.id}',${!l.pinned})">📌</div>
          <div class="card-action" title="수정" onclick="window._openEdit('${l.id}')">✏️</div>
        </div>
      </div>`;
  }

  function pinnedCardHTML(l) {
    return `<a class="pinned-card" href="${l.url}" target="_blank" rel="noopener">
      <span class="card-emoji">${l.emoji}</span>
      <span>${l.title}</span>
    </a>`;
  }

  window.toggleCat = h => h.closest('.cat-block').classList.toggle('collapsed');

  // ── Admin UI ────────────────────────────────────
  function updateAdminUI() {
    const show = isAdmin ? 'flex' : 'none';
    document.querySelectorAll('.card-drag').forEach(e => e.style.display = show);
    document.querySelectorAll('.cat-drag-handle').forEach(e => e.style.display = isAdmin ? 'inline-block' : 'none');
    document.querySelectorAll('.card-actions').forEach(e => e.style.display = show);
    document.querySelectorAll('.link-card').forEach(e => isAdmin ? e.setAttribute('draggable','true') : e.removeAttribute('draggable'));
    document.querySelectorAll('.cat-block').forEach(e => isAdmin ? e.setAttribute('draggable','true') : e.removeAttribute('draggable'));
    document.getElementById('add-btn').style.display = isAdmin ? 'block' : 'none';
  }

  // ── Auth ────────────────────────────────────────
  window.login = () => {
    if (isAdmin) return;
    const pw = prompt('관리자 비밀번호를 입력하세요.');
    if (pw === '9600') {
      isAdmin = true; adminPw = pw;
      document.getElementById('lock-btn').textContent = '🔓';
      document.getElementById('lock-btn').classList.add('active');
      render();
    } else if (pw !== null) alert('비밀번호가 틀렸습니다.');
  };

  // ── Pin toggle ──────────────────────────────────
  window._togglePin = async (id, val) => {
    if (!isAdmin) return;
    await updateDoc(doc(db, 'links', id), { pinned: val });
    await loadData();
  };

  // ── DnD ─────────────────────────────────────────
  let dragEl = null, dragType = null;

  function enableDnD() {
    document.querySelectorAll('.link-card[draggable="true"]').forEach(el => {
      el.ondragstart = e => { e.stopPropagation(); dragEl = el; dragType = 'card'; setTimeout(() => el.classList.add('dragging'), 0); };
      el.ondragend = e => { e.stopPropagation(); el.classList.remove('dragging'); dragEl = null; saveOrder(); };
      el.ondragover = e => { e.preventDefault(); e.stopPropagation(); };
      el.ondragenter = e => { e.preventDefault(); e.stopPropagation(); if (dragType === 'card') el.classList.add('drag-over'); };
      el.ondragleave = e => { e.stopPropagation(); el.classList.remove('drag-over'); };
      el.ondrop = e => {
        e.stopPropagation(); el.classList.remove('drag-over');
        if (dragType === 'card' && dragEl && dragEl !== el && dragEl.parentNode === el.parentNode)
          el.parentNode.insertBefore(dragEl, el);
      };
    });

    document.querySelectorAll('.cat-block').forEach(el => {
      el.ondragstart = e => { dragEl = el; dragType = 'cat'; setTimeout(() => el.classList.add('dragging'), 0); };
      el.ondragend = e => { el.classList.remove('dragging'); dragEl = null; saveOrder(); };
      el.ondragover = e => e.preventDefault();
      el.ondragenter = e => { e.preventDefault(); if (dragType === 'cat') el.classList.add('drag-over'); };
      el.ondragleave = () => el.classList.remove('drag-over');
      el.ondrop = e => {
        e.stopPropagation(); el.classList.remove('drag-over');
        if (dragType === 'cat' && dragEl && dragEl !== el && dragEl.parentNode === el.parentNode)
          el.parentNode.insertBefore(dragEl, el);
      };
    });
  }

  async function saveOrder() {
    const batch = writeBatch(db);
    let order = 0;

    // pinned 항목은 현재 order 유지
    rawLinks.filter(l => l.pinned).forEach(l => {
      batch.update(doc(db, 'links', l.id), { order: order++ });
    });

    const collectCol = (colId, pos) => {
      document.querySelectorAll(`#${colId} .cat-block`).forEach(block => {
        const cat = block.querySelector('.cat-name').textContent;
        block.querySelectorAll('.link-card').forEach(card => {
          const item = JSON.parse(card.dataset.item);
          batch.update(doc(db, 'links', item.id), { order: order++, category: cat, position: pos });
        });
      });
    };
    collectCol('col-left', 'left');
    collectCol('col-right', 'right');
    await batch.commit();
    await loadData();
  }

  // ── Sidebar ─────────────────────────────────────
  window.openSidebar = (link = null) => {
    if (!isAdmin) return window.login();
    buildCatSelect(link ? link.category : '');

    document.getElementById('sb-title').textContent = link ? '링크 수정' : '새 링크 추가';
    document.getElementById('f-id').value = link ? link.id : '';
    document.getElementById('f-pinned').value = link ? String(link.pinned) : 'false';
    document.getElementById('f-pos').value = link ? link.position : 'left';
    document.getElementById('f-title').value = link ? link.title : '';
    document.getElementById('f-url').value = link ? link.url : '';
    setEmoji(link ? link.emoji : '🔗');

    document.getElementById('subs-wrap').innerHTML = '';
    if (link && link.subs && link.subs.length) link.subs.forEach(s => addSubRow(s.title, s.url));

    document.getElementById('f-delete').style.display = link ? 'block' : 'none';

    document.getElementById('overlay').style.display = 'block';
    requestAnimationFrame(() => {
      document.getElementById('overlay').style.opacity = '1';
      document.getElementById('sidebar').style.right = '0';
    });
  };

  window._openEdit = (id) => {
    const link = rawLinks.find(l => l.id === id);
    if (link) window.openSidebar(link);
  };

  window.closeSidebar = () => {
    document.getElementById('sidebar').style.right = '-440px';
    document.getElementById('overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('overlay').style.display = 'none', 280);
    document.getElementById('emoji-picker').style.display = 'none';
  };

  function buildCatSelect(selected = '') {
    const sel = document.getElementById('f-cat');
    const cats = [...new Set(rawLinks.map(l => l.category))];
    sel.innerHTML = `<option value="" disabled ${!selected ? 'selected' : ''}>카테고리 선택</option>`
      + cats.map(c => `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`).join('')
      + `<option value="_new_" ${!cats.includes(selected) && selected ? 'selected' : ''}>+ 새 카테고리</option>`;
    const inp = document.getElementById('f-cat-new');
    if (!cats.includes(selected) && selected) { inp.style.display = 'block'; inp.value = selected; }
    else { inp.style.display = 'none'; inp.value = ''; }
  }

  window.onCatChange = () => {
    const inp = document.getElementById('f-cat-new');
    inp.style.display = document.getElementById('f-cat').value === '_new_' ? 'block' : 'none';
    if (inp.style.display === 'block') inp.focus();
  };

  window.addSubRow = (title = '', url = '') => {
    const wrap = document.getElementById('subs-wrap');
    const div = document.createElement('div');
    div.className = 'sub-row';
    div.innerHTML = `
      <input type="text" class="sb-input sub-t" placeholder="이름" value="${title}" style="flex:1; width:auto;">
      <input type="text" class="sb-input sub-u" placeholder="URL" value="${url}" style="flex:2; width:auto;">
      <button type="button" class="sub-del" onclick="this.closest('.sub-row').remove()">✕</button>`;
    wrap.appendChild(div);
  };

  // ── Save / Delete ────────────────────────────────
  window.handleSave = async () => {
    let cat = document.getElementById('f-cat').value;
    if (cat === '_new_') cat = document.getElementById('f-cat-new').value.trim();
    const title = document.getElementById('f-title').value.trim();
    const url = document.getElementById('f-url').value.trim();
    if (!cat || !title || !url) { alert('카테고리, 제목, URL은 필수입니다.'); return; }

    const subs = [];
    document.querySelectorAll('.sub-row').forEach(row => {
      const t = row.querySelector('.sub-t').value.trim();
      const u = row.querySelector('.sub-u').value.trim();
      if (t || u) subs.push({ title: t, url: u });
    });

    const id = document.getElementById('f-id').value;
    const data = {
      cat, category: cat, title, url,
      emoji: document.getElementById('f-emoji').value,
      pinned: document.getElementById('f-pinned').value === 'true',
      position: document.getElementById('f-pos').value,
      subs
    };

    const btn = document.getElementById('f-save');
    btn.textContent = '저장 중…'; btn.disabled = true;

    if (id) {
      await updateDoc(doc(db, 'links', id), data);
    } else {
      data.order = rawLinks.length;
      await addDoc(collection(db, 'links'), data);
    }

    window.closeSidebar();
    await loadData();
    btn.textContent = '저장하기'; btn.disabled = false;
  };

  window.handleDelete = async () => {
    const id = document.getElementById('f-id').value;
    if (!id || !confirm('정말 이 링크를 삭제하시겠습니까?')) return;
    const btn = document.getElementById('f-delete');
    btn.textContent = '삭제 중…'; btn.disabled = true;
    await deleteDoc(doc(db, 'links', id));
    window.closeSidebar();
    await loadData();
    btn.textContent = '이 링크 삭제'; btn.disabled = false;
  };

  // ── Emoji picker ─────────────────────────────────
  function buildEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    EMOJIS.forEach(e => {
      const s = document.createElement('span');
      s.className = 'ep-item'; s.textContent = e;
      s.onclick = ev => { ev.stopPropagation(); setEmoji(e); picker.style.display = 'none'; };
      picker.appendChild(s);
    });
  }

  function setEmoji(e) {
    document.getElementById('f-emoji').value = e;
    document.getElementById('emoji-btn').textContent = e;
  }

  window.toggleEmojiPicker = e => {
    if (e) e.stopPropagation();
    const picker = document.getElementById('emoji-picker');
    picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid';
  };

  document.addEventListener('click', e => {
    const picker = document.getElementById('emoji-picker');
    if (!document.getElementById('emoji-btn').contains(e.target) && !picker.contains(e.target))
      picker.style.display = 'none';
  });

  // ── Theme ────────────────────────────────────────
  function applyStoredTheme() {
    if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
  }

  window.toggleTheme = () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  };
</script>
</body>
</html>
