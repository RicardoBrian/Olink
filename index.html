<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>오범석 링크 모음</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blur: 20px;
    --glass: rgba(255,255,255,0.72);
    --glass-border: rgba(255,255,255,0.9);
    --glass-hover: rgba(255,255,255,0.88);
    --glass-deep: rgba(255,255,255,0.45);
    --text: #18181b;
    --text-2: #52525b;
    --text-3: #a1a1aa;
    --accent: #5b4fff;
    --accent-glow: rgba(91,79,255,0.22);
    --shadow: 0 4px 24px rgba(91,79,255,0.10), 0 1px 4px rgba(0,0,0,0.06);
    --shadow-hover: 0 12px 40px rgba(91,79,255,0.18), 0 4px 12px rgba(0,0,0,0.08);
    --t: 200ms cubic-bezier(.4,0,.2,1);
    --radius: 16px;
    --radius-lg: 24px;
  }

  [data-theme="dark"] {
    --glass: rgba(30,28,48,0.78);
    --glass-border: rgba(255,255,255,0.10);
    --glass-hover: rgba(40,36,64,0.88);
    --glass-deep: rgba(0,0,0,0.30);
    --text: #f4f4f5;
    --text-2: #a1a1aa;
    --text-3: #52525b;
    --accent: #7c6fff;
    --accent-glow: rgba(124,111,255,0.28);
    --shadow: 0 4px 24px rgba(0,0,0,0.35);
    --shadow-hover: 0 12px 40px rgba(0,0,0,0.5);
  }

  /* ── Background ── */
  body {
    font-family: -apple-system, 'Apple SD Gothic Neo', 'Pretendard', BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    color: var(--text);
    overflow-x: hidden;
    position: relative;
  }

  .bg {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(135deg, #c9d6ff 0%, #e2d9f3 30%, #ffd6e7 60%, #d0f0fd 100%);
    transition: background 0.6s;
  }
  [data-theme="dark"] .bg {
    background: linear-gradient(135deg, #0f0c29 0%, #1a1040 35%, #24243e 65%, #0f1928 100%);
  }

  /* floating blobs */
  .blob {
    position: fixed; border-radius: 50%; filter: blur(80px);
    animation: float 12s ease-in-out infinite; pointer-events: none; z-index: -1;
  }
  .blob-1 { width: 500px; height: 500px; background: rgba(168,130,255,0.22); top: -120px; left: -100px; animation-delay: 0s; }
  .blob-2 { width: 400px; height: 400px; background: rgba(100,180,255,0.18); top: 40%; right: -80px; animation-delay: -4s; }
  .blob-3 { width: 350px; height: 350px; background: rgba(255,160,200,0.16); bottom: -80px; left: 30%; animation-delay: -8s; }

  [data-theme="dark"] .blob-1 { background: rgba(80,40,180,0.5); }
  [data-theme="dark"] .blob-2 { background: rgba(20,80,160,0.45); }
  [data-theme="dark"] .blob-3 { background: rgba(120,20,80,0.35); }

  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    33% { transform: translate(30px,-30px) scale(1.05); }
    66% { transform: translate(-20px,20px) scale(0.97); }
  }

  /* ── Glass mixin ── */
  .glass {
    background: var(--glass);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    box-shadow: var(--shadow);
  }

  /* ── Lock Screen ── */
  #lock-screen {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
  }
  .lock-card {
    width: 100%; max-width: 360px;
    border-radius: var(--radius-lg);
    padding: 40px 36px;
    text-align: center;
  }
  .lock-icon { font-size: 2.8rem; margin-bottom: 20px; display: block; }
  .lock-title { font-size: 1.25rem; font-weight: 800; margin-bottom: 6px; letter-spacing: -.4px; }
  .lock-sub { font-size: .85rem; color: var(--text-2); margin-bottom: 28px; }
  .lock-input-wrap { position: relative; margin-bottom: 14px; }
  .lock-input {
    width: 100%; padding: 14px 48px 14px 18px;
    border-radius: 12px; border: 1.5px solid var(--glass-border);
    background: var(--glass-deep); color: var(--text);
    font-size: 1.1rem; letter-spacing: .3em;
    text-align: center; outline: none;
    backdrop-filter: blur(8px);
    transition: border-color var(--t);
  }
  .lock-input:focus { border-color: var(--accent); }
  .lock-input::placeholder { letter-spacing: normal; font-size: .85rem; }
  .lock-eye {
    position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
    cursor: pointer; color: var(--text-3); font-size: 1rem; user-select: none;
  }
  .lock-btn {
    width: 100%; padding: 14px;
    border-radius: 12px; border: none;
    background: var(--accent); color: #fff;
    font-size: .9rem; font-weight: 700;
    cursor: pointer; letter-spacing: .04em;
    box-shadow: 0 4px 20px var(--accent-glow);
    transition: opacity var(--t), transform var(--t);
  }
  .lock-btn:hover { opacity: .88; transform: translateY(-1px); }
  .lock-attempts { font-size: .78rem; color: #ef4444; margin-top: 12px; min-height: 20px; }
  .lock-blocked { font-size: .85rem; color: #ef4444; margin-top: 8px; font-weight: 600; }

  /* ── Main Layout ── */
  .wrap { max-width: 1100px; margin: 0 auto; padding: 44px 24px 80px; }

  /* ── Header ── */
  .site-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 44px;
  }
  .site-title {
    font-size: 1rem; font-weight: 800; letter-spacing: -.3px;
  }
  .site-title span { color: var(--text-2); font-weight: 500; }

  .header-actions { display: flex; gap: 6px; }
  .hdr-btn {
    width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--text-2); font-size: .95rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(12px); transition: all var(--t);
  }
  .hdr-btn:hover { background: var(--glass-hover); color: var(--text); transform: scale(1.05); }
  .hdr-btn.active { color: var(--accent); border-color: var(--accent-glow); }

  /* ── Search ── */
  .search-wrap { position: relative; margin-bottom: 32px; }
  .search-input {
    width: 100%; padding: 13px 18px 13px 44px;
    border-radius: var(--radius); border: 1px solid var(--glass-border);
    background: var(--glass); color: var(--text);
    font-size: .9rem; outline: none;
    backdrop-filter: blur(var(--blur));
    transition: border-color var(--t), box-shadow var(--t);
  }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search-input::placeholder { color: var(--text-3); }
  .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-3); font-size: .9rem; pointer-events: none; }
  .search-clear { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-3); cursor: pointer; font-size: .85rem; display: none; }

  /* ── Pinned ── */
  #pinned-section { display: none; margin-bottom: 36px; }
  .section-label {
    font-size: .68rem; font-weight: 800; letter-spacing: .12em;
    text-transform: uppercase; color: var(--text-3); margin-bottom: 12px;
  }
  .pinned-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 8px; }

  /* ── Board ── */
  .board { display: grid; grid-template-columns: 1fr 1fr; gap: 0 44px; align-items: start; }
  @media (max-width: 740px) {
    .board { grid-template-columns: 1fr; }
    .wrap { padding: 24px 14px 80px; }
    .site-header { margin-bottom: 28px; }
  }

  /* ── Category ── */
  .cat-block { margin-bottom: 28px; }
  .cat-header {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 0 10px; margin-bottom: 8px;
    border-bottom: 1px solid var(--glass-border);
    cursor: pointer; user-select: none;
  }
  .cat-drag-handle { display: none; color: var(--text-3); font-size: .8rem; cursor: grab; padding: 2px 4px; }
  .cat-name { font-size: .7rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); flex: 1; transition: color var(--t); }
  .cat-header:hover .cat-name { color: var(--text-2); }
  .cat-toggle { font-size: .6rem; color: var(--text-3); transition: transform var(--t); }
  .cat-block.collapsed .cat-toggle { transform: rotate(-90deg); }
  .cat-body { display: flex; flex-direction: column; gap: 7px; }
  .cat-block.collapsed .cat-body { display: none; }

  /* ── Card ── */
  .link-card {
    display: flex; align-items: stretch;
    border-radius: var(--radius); overflow: hidden;
    background: var(--glass);
    backdrop-filter: blur(var(--blur));
    -webkit-backdrop-filter: blur(var(--blur));
    border: 1px solid var(--glass-border);
    transition: all var(--t);
  }
  .link-card:hover {
    background: var(--glass-hover);
    box-shadow: var(--shadow-hover);
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.45);
  }
  .card-drag {
    display: none; align-items: center; justify-content: center;
    width: 26px; color: var(--text-3); font-size: .75rem;
    cursor: grab; flex-shrink: 0;
  }
  .card-main {
    display: flex; align-items: center; gap: 10px; flex: 1;
    padding: 12px 14px 12px 12px; text-decoration: none;
    color: var(--text); min-width: 0; font-size: .875rem; font-weight: 600;
    transition: color var(--t);
  }
  .card-main:hover { color: var(--accent); }
  .card-emoji { font-size: 1.05rem; flex-shrink: 0; line-height: 1; }
  .card-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-subs { display: flex; align-items: center; gap: 4px; padding: 0 8px 0 0; flex-shrink: 0; flex-wrap: wrap; }
  .card-sub-link {
    font-size: .68rem; font-weight: 700; color: var(--text-2);
    text-decoration: none; padding: 3px 9px; border-radius: 20px;
    background: var(--glass-deep); border: 1px solid var(--glass-border);
    white-space: nowrap; transition: all var(--t);
  }
  .card-sub-link:hover { background: var(--accent); color: #fff; border-color: transparent; }
  .card-actions {
    display: none; align-items: center; padding: 0 4px;
    border-left: 1px solid var(--glass-border);
  }
  .card-action {
    width: 30px; min-height: 40px; display: flex; align-items: center; justify-content: center;
    font-size: .78rem; cursor: pointer; color: var(--text-3);
    transition: all var(--t); border-radius: 8px;
  }
  .card-action:hover { color: var(--accent); background: var(--accent-glow); }
  .card-action.on { color: var(--accent); }

  /* ── Pinned card ── */
  .pinned-card {
    display: flex; align-items: center; gap: 9px; padding: 10px 14px;
    border-radius: var(--radius); text-decoration: none;
    color: var(--text); font-size: .82rem; font-weight: 600;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(var(--blur));
    transition: all var(--t);
  }
  .pinned-card:hover { background: var(--glass-hover); transform: translateY(-1px); box-shadow: var(--shadow); }

  /* ── Loader ── */
  #loader { display: flex; align-items: center; justify-content: center; padding: 80px 0; }
  .spinner { width: 26px; height: 26px; border: 2.5px solid var(--glass-border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── No results ── */
  #no-results { display: none; text-align: center; padding: 60px 0; color: var(--text-3); font-size: .9rem; }

  /* ── Add btn ── */
  #add-btn {
    display: none; width: 100%; margin-top: 36px; padding: 14px;
    border-radius: var(--radius); border: 1.5px dashed var(--glass-border);
    background: var(--glass-deep); color: var(--text-3);
    backdrop-filter: blur(12px);
    font-size: .78rem; font-weight: 700; letter-spacing: .06em;
    text-transform: uppercase; cursor: pointer;
    transition: all var(--t);
  }
  #add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* ── Overlay ── */
  #overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); backdrop-filter: blur(6px);
    z-index: 100; opacity: 0; transition: opacity .25s;
  }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed; top: 0; right: -440px; bottom: 0;
    width: 100%; max-width: 400px;
    background: var(--glass); backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border-left: 1px solid var(--glass-border);
    z-index: 101; display: flex; flex-direction: column;
    transition: right .28s cubic-bezier(.4,0,.2,1);
  }
  .sb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 24px 18px; border-bottom: 1px solid var(--glass-border); flex-shrink: 0;
  }
  .sb-title { font-size: .95rem; font-weight: 800; }
  .sb-close {
    width: 32px; height: 32px; border: 1px solid var(--glass-border);
    background: var(--glass); border-radius: 10px; color: var(--text-2);
    font-size: 1rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--t);
  }
  .sb-close:hover { background: var(--glass-hover); color: var(--text); }

  .sb-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .sb-label { font-size: .68rem; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--text-3); margin-bottom: 5px; }

  .sb-input {
    width: 100%; padding: 11px 14px;
    background: var(--glass-deep); border: 1px solid var(--glass-border);
    border-radius: 12px; color: var(--text); font-size: .875rem;
    outline: none; appearance: none; backdrop-filter: blur(8px);
    transition: border-color var(--t), box-shadow var(--t);
  }
  .sb-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  select.sb-input { cursor: pointer; }

  .emoji-row { display: flex; gap: 10px; align-items: center; position: relative; }
  #emoji-btn {
    width: 46px; height: 46px; flex-shrink: 0;
    background: var(--glass-deep); border: 1px solid var(--glass-border);
    border-radius: 12px; font-size: 1.15rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--t); user-select: none;
  }
  #emoji-btn:hover { border-color: var(--accent); background: var(--accent-glow); transform: scale(1.05); }

  #emoji-picker {
    display: none; position: absolute; top: calc(100% + 8px); left: 0; width: 300px;
    grid-template-columns: repeat(9, 1fr); gap: 3px; padding: 12px;
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: var(--radius-lg); box-shadow: var(--shadow-lg, 0 20px 60px rgba(0,0,0,0.25));
    backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
    z-index: 110; max-height: 220px; overflow-y: auto;
  }
  .ep-item { font-size: .95rem; text-align: center; padding: 5px; border-radius: 8px; cursor: pointer; transition: all var(--t); }
  .ep-item:hover { background: var(--glass-hover); transform: scale(1.2); }

  .sub-row { display: flex; gap: 6px; align-items: center; }
  .sub-row .sb-input { margin: 0; }
  .sub-del {
    flex-shrink: 0; width: 30px; height: 30px; border: 1px solid var(--glass-border);
    background: var(--glass-deep); border-radius: 8px; color: var(--text-3);
    font-size: .85rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all var(--t);
  }
  .sub-del:hover { background: rgba(239,68,68,.15); border-color: #fca5a5; color: #ef4444; }
  .sub-add-btn {
    width: 100%; padding: 9px; background: var(--glass-deep);
    border: 1px dashed var(--glass-border); border-radius: 12px;
    color: var(--text-3); font-size: .78rem; font-weight: 700; cursor: pointer;
    transition: all var(--t); letter-spacing: .04em;
  }
  .sub-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  .sb-footer { padding: 14px 20px 22px; display: flex; flex-direction: column; gap: 8px; border-top: 1px solid var(--glass-border); flex-shrink: 0; }
  .sb-save {
    padding: 13px; background: var(--accent); color: #fff;
    border: none; border-radius: 12px; font-size: .875rem; font-weight: 800;
    cursor: pointer; box-shadow: 0 4px 20px var(--accent-glow);
    transition: opacity var(--t), transform var(--t);
  }
  .sb-save:hover { opacity: .88; transform: translateY(-1px); }
  .sb-save:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .sb-delete {
    display: none; padding: 11px; background: rgba(239,68,68,.08);
    color: #ef4444; border: 1px solid rgba(239,68,68,.25); border-radius: 12px;
    font-size: .8rem; font-weight: 700; cursor: pointer; transition: all var(--t);
  }
  .sb-delete:hover { background: rgba(239,68,68,.15); }

  /* DnD */
  .link-card.dragging, .cat-block.dragging { opacity: .35; }
  .link-card.drag-over { box-shadow: 0 0 0 2px var(--accent), var(--shadow-hover); }
  .cat-block.drag-over .cat-body { outline: 2px dashed var(--accent); outline-offset: 4px; border-radius: var(--radius); }

  /* no-match fade */
  .link-card.hidden { display: none; }
  .cat-block.all-hidden { display: none; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ── Lock Screen ── -->
<div id="lock-screen">
  <div class="lock-card glass" id="lock-card">
    <span class="lock-icon" id="lock-icon-el">🔐</span>
    <div class="lock-title">비공개 페이지</div>
    <div class="lock-sub" id="lock-sub">접속 비밀번호를 입력하세요</div>
    <div id="lock-body">
      <div class="lock-input-wrap">
        <input type="password" class="lock-input" id="lock-pw" placeholder="비밀번호 입력" maxlength="20" onkeydown="if(event.key==='Enter')checkLock()">
        <span class="lock-eye" onclick="toggleLockEye()">👁</span>
      </div>
      <button class="lock-btn" onclick="checkLock()">입장하기</button>
      <div class="lock-attempts" id="lock-msg"></div>
    </div>
  </div>
</div>

<!-- ── Main App ── -->
<div id="app" style="display:none">
  <div class="wrap">
    <header class="site-header">
      <div class="site-title">오범석 <span>링크 모음</span></div>
      <div class="header-actions">
        <button class="hdr-btn" onclick="toggleTheme()" title="테마">◐</button>
        <button class="hdr-btn" id="lock-btn" onclick="adminLogin()" title="관리자">🔒</button>
      </div>
    </header>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="링크 검색..." oninput="handleSearch(this.value)">
      <span class="search-clear" id="search-clear" onclick="clearSearch()">✕</span>
    </div>

    <section id="pinned-section">
      <div class="section-label">📌 상단 고정</div>
      <div class="pinned-grid" id="pinned-grid"></div>
    </section>

    <div id="loader"><div class="spinner"></div></div>
    <div id="no-results">🔍 검색 결과가 없습니다</div>

    <div class="board" id="board" style="display:none">
      <div id="col-left"></div>
      <div id="col-right"></div>
    </div>

    <button id="add-btn" onclick="openSidebar()">+ 새 링크 추가</button>
  </div>
</div>

<!-- Overlay -->
<div id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-header">
    <span class="sb-title" id="sb-title">새 링크 추가</span>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sb-body">
    <input type="hidden" id="f-id">
    <input type="hidden" id="f-pinned" value="false">
    <div>
      <div class="sb-label">위치</div>
      <select id="f-pos" class="sb-input">
        <option value="left">왼쪽 단</option>
        <option value="right">오른쪽 단</option>
      </select>
    </div>
    <div>
      <div class="sb-label">카테고리</div>
      <select id="f-cat" class="sb-input" onchange="onCatChange()"></select>
      <input type="text" id="f-cat-new" class="sb-input" placeholder="새 카테고리 이름" style="display:none; margin-top:6px;">
    </div>
    <div>
      <div class="sb-label">제목 & 이모지</div>
      <div class="emoji-row">
        <button type="button" id="emoji-btn" onclick="toggleEmojiPicker(event)">🔗</button>
        <input type="hidden" id="f-emoji" value="🔗">
        <input type="text" id="f-title" class="sb-input" placeholder="제목" style="flex:1; width:auto;">
        <div id="emoji-picker"></div>
      </div>
    </div>
    <div>
      <div class="sb-label">URL</div>
      <input type="text" id="f-url" class="sb-input" placeholder="https://">
    </div>
    <div>
      <div class="sb-label">서브 버튼</div>
      <div id="subs-wrap" style="display:flex; flex-direction:column; gap:6px; margin-bottom:8px;"></div>
      <button type="button" class="sub-add-btn" onclick="addSubRow()">+ 서브 버튼 추가</button>
    </div>
  </div>
  <div class="sb-footer">
    <button class="sb-save" id="f-save" onclick="handleSave()">저장하기</button>
    <button class="sb-delete" id="f-delete" onclick="handleDelete()">이 링크 삭제</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
  import {
    getFirestore, collection, getDocs, addDoc, updateDoc, deleteDoc,
    doc, query, orderBy, writeBatch, increment, setDoc
  } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDEKGBEhenAfsxPz5SXMFBMjctQkCdRW5A",
    authDomain: "olink-76ad8.firebaseapp.com",
    projectId: "olink-76ad8",
    storageBucket: "olink-76ad8.firebasestorage.app",
    messagingSenderId: "1093215928826",
    appId: "1:1093215928826:web:5155fb31a9e57b94316443"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ── Cookie helpers ──────────────────────────────
  function setCookie(name, value, days) {
    const d = new Date();
    d.setTime(d.getTime() + days * 864e5);
    document.cookie = `${name}=${value};expires=${d.toUTCString()};path=/;SameSite=Strict`;
  }
  function getCookie(name) {
    const m = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
    return m ? m[2] : null;
  }

  // ── Lock Screen ─────────────────────────────────
  const SITE_PW = '0234';
  let lockAttempts = parseInt(getCookie('lock_attempts') || '0');

  function initLock() {
    if (getCookie('site_auth') === '1') {
      showApp(); return;
    }
    if (getCookie('site_locked') === '1') {
      showBlocked(); return;
    }
    document.getElementById('lock-screen').style.display = 'flex';
  }

  function showApp() {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    trackVisit();
    loadData();
  }

  function showBlocked() {
    document.getElementById('lock-icon-el').textContent = '🚫';
    document.getElementById('lock-sub').textContent = '접속이 차단되었습니다';
    document.getElementById('lock-body').innerHTML = `<div class="lock-blocked">비밀번호를 3회 틀려 이 기기에서 접속이 불가합니다.<br>브라우저 쿠키를 초기화하면 다시 시도할 수 있습니다.</div>`;
  }

  window.checkLock = () => {
    const val = document.getElementById('lock-pw').value;
    if (val === SITE_PW) {
      setCookie('site_auth', '1', 7);
      setCookie('lock_attempts', '0', 1);
      showApp();
    } else {
      lockAttempts++;
      setCookie('lock_attempts', lockAttempts, 1);
      const left = 3 - lockAttempts;
      if (lockAttempts >= 3) {
        setCookie('site_locked', '1', 365);
        showBlocked();
      } else {
        document.getElementById('lock-msg').textContent = `비밀번호가 틀렸습니다. (${left}회 남음)`;
        document.getElementById('lock-pw').value = '';
        document.getElementById('lock-pw').focus();
      }
    }
  };

  window.toggleLockEye = () => {
    const inp = document.getElementById('lock-pw');
    inp.type = inp.type === 'password' ? 'text' : 'password';
  };

  // ── State ───────────────────────────────────────
  let isAdmin = false;
  let adminPw = '';
  let rawLinks = [];

  const EMOJIS = [
    // 학교/공부
    '🏫','📝','📚','📖','🎓','📐','📏','🔬','🔭','🧪','🧬','📊','📈','📉',
    // 기술/개발
    '🖥️','💻','📱','⌨️','🖱️','🖨️','💾','💿','📀','🔌','🔋','📡','🛜',
    // 인터넷/소통
    '🌐','🔗','📧','💬','📨','📩','📤','📥','📢','📣','🔔','📰',
    // 파일/문서
    '📁','📂','🗂️','📋','📄','📃','📑','🗒️','🗓️','📅','📆','🗃️',
    // 생산성
    '✅','☑️','📌','📍','🔖','🏷️','✏️','🖊️','🖋️','✒️','📎','🖇️','📐',
    // 홈/라이프
    '🏠','🏡','🏢','🏬','🏪','🏨','🏥','🏦','🏛️','⛪',
    // 미디어
    '🎵','🎶','🎼','🎬','📸','📷','🎥','📹','🎙️','🎧','🎮','🕹️',
    // 쇼핑/음식
    '🛒','🛍️','🍎','🍕','🍔','☕','🧋','🍜','🥗','🍱',
    // 이동/장소
    '🚀','✈️','🚗','🚌','🚂','⛵','🗺️','🧭','📍','🏃',
    // 기타 유용
    '⭐','🌟','💡','🔥','💎','🎯','🏆','🥇','🎁','🎨','🛠️','⚙️','🔧','🔑','🗝️','🔒','🔓','💼','👤','👥','🤝','💪'
  ];

  // ── Boot ────────────────────────────────────────
  buildEmojiPicker();
  applyStoredTheme();
  initLock();

  async function trackVisit() {
    await setDoc(doc(db, 'stats', 'visits'), { count: increment(1) }, { merge: true });
  }

  // ── Load ────────────────────────────────────────
  async function loadData() {
    const snap = await getDocs(query(collection(db, 'links'), orderBy('order', 'asc')));
    rawLinks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    document.getElementById('loader').style.display = 'none';
    document.getElementById('board').style.display = 'grid';
    render();
  }

  // ── Search ──────────────────────────────────────
  window.handleSearch = (q) => {
    const term = q.toLowerCase().trim();
    document.getElementById('search-clear').style.display = term ? 'block' : 'none';

    document.querySelectorAll('.link-card').forEach(card => {
      const item = JSON.parse(card.dataset.item);
      const match = !term
        || item.title.toLowerCase().includes(term)
        || item.category.toLowerCase().includes(term)
        || (item.subs || []).some(s => s.title.toLowerCase().includes(term));
      card.classList.toggle('hidden', !match);
    });

    document.querySelectorAll('.cat-block').forEach(block => {
      const visible = block.querySelectorAll('.link-card:not(.hidden)').length > 0;
      block.classList.toggle('all-hidden', !visible);
    });

    const anyVisible = document.querySelectorAll('.link-card:not(.hidden)').length > 0;
    document.getElementById('no-results').style.display = (term && !anyVisible) ? 'block' : 'none';
  };

  window.clearSearch = () => {
    document.getElementById('search-input').value = '';
    window.handleSearch('');
  };

  // ── Render ──────────────────────────────────────
  function render() {
    const pg = document.getElementById('pinned-grid');
    const colL = document.getElementById('col-left');
    const colR = document.getElementById('col-right');
    pg.innerHTML = ''; colL.innerHTML = ''; colR.innerHTML = '';

    const pinned = rawLinks.filter(l => l.pinned);
    const ps = document.getElementById('pinned-section');
    if (pinned.length) {
      ps.style.display = 'block';
      pinned.forEach(l => pg.insertAdjacentHTML('beforeend', pinnedCardHTML(l)));
    } else {
      ps.style.display = 'none';
    }

    const lG = {}, rG = {};
    rawLinks.filter(l => !l.pinned).forEach(l => {
      const g = l.position === 'right' ? rG : lG;
      (g[l.category] = g[l.category] || []).push(l);
    });

    renderCol(lG, colL);
    renderCol(rG, colR);
    updateAdminUI();
    if (isAdmin) enableDnD();
  }

  function renderCol(groups, container) {
    for (const cat in groups) {
      const block = document.createElement('div');
      block.className = 'cat-block';
      block.innerHTML = `
        <div class="cat-header" onclick="toggleCat(this)">
          <span class="cat-drag-handle">⠿</span>
          <span class="cat-name">${cat}</span>
          <span class="cat-toggle">▾</span>
        </div>
        <div class="cat-body">
          ${groups[cat].map(l => cardHTML(l)).join('')}
        </div>`;
      container.appendChild(block);
    }
  }

  function cardHTML(l) {
    const d = JSON.stringify(l).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const subsHTML = (l.subs || []).map(s =>
      `<a class="card-sub-link" href="${s.url}" target="_blank" rel="noopener">${s.title}</a>`
    ).join('');
    return `
      <div class="link-card" ${isAdmin ? 'draggable="true"' : ''} data-item="${d}">
        <div class="card-drag">⠿</div>
        <a class="card-main" href="${l.url}" target="_blank" rel="noopener">
          <span class="card-emoji">${l.emoji}</span>
          <span class="card-title">${l.title}</span>
        </a>
        ${subsHTML ? `<div class="card-subs">${subsHTML}</div>` : ''}
        <div class="card-actions">
          <div class="card-action ${l.pinned ? 'on' : ''}" title="${l.pinned ? '고정 해제' : '상단 고정'}" onclick="window._togglePin('${l.id}',${!l.pinned})">📌</div>
          <div class="card-action" title="수정" onclick="window._openEdit('${l.id}')">✏️</div>
        </div>
      </div>`;
  }

  function pinnedCardHTML(l) {
    return `<a class="pinned-card" href="${l.url}" target="_blank" rel="noopener">
      <span class="card-emoji">${l.emoji}</span><span>${l.title}</span>
    </a>`;
  }

  window.toggleCat = h => h.closest('.cat-block').classList.toggle('collapsed');

  // ── Admin UI ────────────────────────────────────
  function updateAdminUI() {
    const show = isAdmin ? 'flex' : 'none';
    document.querySelectorAll('.card-drag').forEach(e => e.style.display = show);
    document.querySelectorAll('.cat-drag-handle').forEach(e => e.style.display = isAdmin ? 'inline-block' : 'none');
    document.querySelectorAll('.card-actions').forEach(e => e.style.display = show);
    document.querySelectorAll('.link-card').forEach(e => isAdmin ? e.setAttribute('draggable','true') : e.removeAttribute('draggable'));
    document.querySelectorAll('.cat-block').forEach(e => isAdmin ? e.setAttribute('draggable','true') : e.removeAttribute('draggable'));
    document.getElementById('add-btn').style.display = isAdmin ? 'block' : 'none';
  }

  // ── Auth (admin) ─────────────────────────────────
  window.adminLogin = () => {
    if (isAdmin) return;
    const pw = prompt('관리자 비밀번호를 입력하세요.');
    if (pw === '9600') {
      isAdmin = true; adminPw = pw;
      document.getElementById('lock-btn').textContent = '🔓';
      document.getElementById('lock-btn').classList.add('active');
      render();
    } else if (pw !== null) alert('비밀번호가 틀렸습니다.');
  };

  window._togglePin = async (id, val) => {
    if (!isAdmin) return;
    await updateDoc(doc(db, 'links', id), { pinned: val });
    await loadData();
  };

  // ── DnD ─────────────────────────────────────────
  let dragEl = null, dragType = null;

  function enableDnD() {
    document.querySelectorAll('.link-card[draggable="true"]').forEach(el => {
      el.ondragstart = e => { e.stopPropagation(); dragEl = el; dragType = 'card'; setTimeout(() => el.classList.add('dragging'), 0); };
      el.ondragend = e => { e.stopPropagation(); el.classList.remove('dragging'); dragEl = null; saveOrder(); };
      el.ondragover = e => { e.preventDefault(); e.stopPropagation(); };
      el.ondragenter = e => { e.preventDefault(); e.stopPropagation(); if (dragType === 'card') el.classList.add('drag-over'); };
      el.ondragleave = e => { e.stopPropagation(); el.classList.remove('drag-over'); };
      el.ondrop = e => {
        e.stopPropagation(); el.classList.remove('drag-over');
        if (dragType === 'card' && dragEl && dragEl !== el && dragEl.parentNode === el.parentNode)
          el.parentNode.insertBefore(dragEl, el);
      };
    });
    document.querySelectorAll('.cat-block').forEach(el => {
      el.ondragstart = e => { dragEl = el; dragType = 'cat'; setTimeout(() => el.classList.add('dragging'), 0); };
      el.ondragend = e => { el.classList.remove('dragging'); dragEl = null; saveOrder(); };
      el.ondragover = e => e.preventDefault();
      el.ondragenter = e => { e.preventDefault(); if (dragType === 'cat') el.classList.add('drag-over'); };
      el.ondragleave = () => el.classList.remove('drag-over');
      el.ondrop = e => {
        e.stopPropagation(); el.classList.remove('drag-over');
        if (dragType === 'cat' && dragEl && dragEl !== el && dragEl.parentNode === el.parentNode)
          el.parentNode.insertBefore(dragEl, el);
      };
    });
  }

  async function saveOrder() {
    const batch = writeBatch(db);
    let order = 0;
    rawLinks.filter(l => l.pinned).forEach(l => batch.update(doc(db, 'links', l.id), { order: order++ }));
    const collectCol = (colId, pos) => {
      document.querySelectorAll(`#${colId} .cat-block`).forEach(block => {
        const cat = block.querySelector('.cat-name').textContent;
        block.querySelectorAll('.link-card').forEach(card => {
          const item = JSON.parse(card.dataset.item);
          batch.update(doc(db, 'links', item.id), { order: order++, category: cat, position: pos });
        });
      });
    };
    collectCol('col-left', 'left');
    collectCol('col-right', 'right');
    await batch.commit();
    await loadData();
  }

  // ── Sidebar ──────────────────────────────────────
  window.openSidebar = (link = null) => {
    if (!isAdmin) return window.adminLogin();
    buildCatSelect(link ? link.category : '');
    document.getElementById('sb-title').textContent = link ? '링크 수정' : '새 링크 추가';
    document.getElementById('f-id').value = link ? link.id : '';
    document.getElementById('f-pinned').value = link ? String(link.pinned) : 'false';
    document.getElementById('f-pos').value = link ? link.position : 'left';
    document.getElementById('f-title').value = link ? link.title : '';
    document.getElementById('f-url').value = link ? link.url : '';
    setEmoji(link ? link.emoji : '🔗');
    document.getElementById('subs-wrap').innerHTML = '';
    if (link && link.subs && link.subs.length) link.subs.forEach(s => addSubRow(s.title, s.url));
    document.getElementById('f-delete').style.display = link ? 'block' : 'none';
    document.getElementById('overlay').style.display = 'block';
    requestAnimationFrame(() => {
      document.getElementById('overlay').style.opacity = '1';
      document.getElementById('sidebar').style.right = '0';
    });
  };

  window._openEdit = (id) => { const l = rawLinks.find(x => x.id === id); if (l) window.openSidebar(l); };

  window.closeSidebar = () => {
    document.getElementById('sidebar').style.right = '-440px';
    document.getElementById('overlay').style.opacity = '0';
    setTimeout(() => document.getElementById('overlay').style.display = 'none', 280);
    document.getElementById('emoji-picker').style.display = 'none';
  };

  function buildCatSelect(selected = '') {
    const sel = document.getElementById('f-cat');
    const cats = [...new Set(rawLinks.map(l => l.category))];
    sel.innerHTML = `<option value="" disabled ${!selected ? 'selected' : ''}>카테고리 선택</option>`
      + cats.map(c => `<option value="${c}" ${c === selected ? 'selected' : ''}>${c}</option>`).join('')
      + `<option value="_new_" ${!cats.includes(selected) && selected ? 'selected' : ''}>+ 새 카테고리</option>`;
    const inp = document.getElementById('f-cat-new');
    if (!cats.includes(selected) && selected) { inp.style.display = 'block'; inp.value = selected; }
    else { inp.style.display = 'none'; inp.value = ''; }
  }

  window.onCatChange = () => {
    const inp = document.getElementById('f-cat-new');
    inp.style.display = document.getElementById('f-cat').value === '_new_' ? 'block' : 'none';
    if (inp.style.display === 'block') inp.focus();
  };

  window.addSubRow = (title = '', url = '') => {
    const wrap = document.getElementById('subs-wrap');
    const div = document.createElement('div');
    div.className = 'sub-row';
    div.innerHTML = `
      <input type="text" class="sb-input sub-t" placeholder="이름" value="${title}" style="flex:1; width:auto;">
      <input type="text" class="sb-input sub-u" placeholder="URL" value="${url}" style="flex:2; width:auto;">
      <button type="button" class="sub-del" onclick="this.closest('.sub-row').remove()">✕</button>`;
    wrap.appendChild(div);
  };

  window.handleSave = async () => {
    let cat = document.getElementById('f-cat').value;
    if (cat === '_new_') cat = document.getElementById('f-cat-new').value.trim();
    const title = document.getElementById('f-title').value.trim();
    const url = document.getElementById('f-url').value.trim();
    if (!cat || !title || !url) { alert('카테고리, 제목, URL은 필수입니다.'); return; }
    const subs = [];
    document.querySelectorAll('.sub-row').forEach(row => {
      const t = row.querySelector('.sub-t').value.trim();
      const u = row.querySelector('.sub-u').value.trim();
      if (t || u) subs.push({ title: t, url: u });
    });
    const id = document.getElementById('f-id').value;
    const data = {
      category: cat, title, url,
      emoji: document.getElementById('f-emoji').value,
      pinned: document.getElementById('f-pinned').value === 'true',
      position: document.getElementById('f-pos').value,
      subs
    };
    const btn = document.getElementById('f-save');
    btn.textContent = '저장 중…'; btn.disabled = true;
    if (id) await updateDoc(doc(db, 'links', id), data);
    else { data.order = rawLinks.length; await addDoc(collection(db, 'links'), data); }
    window.closeSidebar();
    await loadData();
    btn.textContent = '저장하기'; btn.disabled = false;
  };

  window.handleDelete = async () => {
    const id = document.getElementById('f-id').value;
    if (!id || !confirm('정말 이 링크를 삭제하시겠습니까?')) return;
    const btn = document.getElementById('f-delete');
    btn.textContent = '삭제 중…'; btn.disabled = true;
    await deleteDoc(doc(db, 'links', id));
    window.closeSidebar();
    await loadData();
    btn.textContent = '이 링크 삭제'; btn.disabled = false;
  };

  // ── Emoji ────────────────────────────────────────
  function buildEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    EMOJIS.forEach(e => {
      const s = document.createElement('span');
      s.className = 'ep-item'; s.textContent = e;
      s.onclick = ev => { ev.stopPropagation(); setEmoji(e); picker.style.display = 'none'; };
      picker.appendChild(s);
    });
  }

  function setEmoji(e) {
    document.getElementById('f-emoji').value = e;
    document.getElementById('emoji-btn').textContent = e;
  }

  window.toggleEmojiPicker = e => {
    if (e) e.stopPropagation();
    const picker = document.getElementById('emoji-picker');
    picker.style.display = picker.style.display === 'grid' ? 'none' : 'grid';
  };

  document.addEventListener('click', e => {
    const picker = document.getElementById('emoji-picker');
    if (!document.getElementById('emoji-btn').contains(e.target) && !picker.contains(e.target))
      picker.style.display = 'none';
  });

  // ── Theme ────────────────────────────────────────
  function applyStoredTheme() {
    if (localStorage.getItem('theme') === 'dark') document.body.setAttribute('data-theme', 'dark');
  }

  window.toggleTheme = () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    isDark ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  };
</script>
</body>
</html>
